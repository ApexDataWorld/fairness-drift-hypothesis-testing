name: Reproduce JASA Fairness Drift Experiments

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  reproduce:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run tests
        run: pytest -q
      - name: Run core fairness drift experiment
        run: python experiments/run_fairness_drift_experiment.py
      - name: Run JASA operating-characteristic experiment
        run: python experiments/run_jasa_operating_characteristics.py
      - name: Verify JASA outputs
        run: python scripts/verify_jasa_outputs.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fairness-drift-jasa-results-py${{ matrix.python-version }}
          path: |
            results/tables/*.csv
            results/figures/*.png
